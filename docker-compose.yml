version: "3.9"

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: alkemist-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/.chroma/index
    environment:
      - ANONYMIZED_TELEMETRY=false
      - ALLOW_RESET=true
    restart: unless-stopped

volumes:
  chroma_data:
    driver: local
